<script>
const TMDB_IMG  = 'https://image.tmdb.org/t/p/';

// Category → material icon
const CAT_ICONS = {
  'violence':'gavel','gore':'gavel',
  'language':'chat_bubble','profanity':'chat_bubble',
  'sex':'favorite','nudity':'favorite','sexual':'favorite',
  'alcohol':'liquor','drugs':'science','smoking':'smoking_rooms',
  'horror':'skull','scary':'skull','frightening':'skull',
  'themes':'psychology','messages':'psychology',
  'bullying':'shield_person','abuse':'shield_person',
};

// Level → label + Tailwind colour class
const LEVEL_CFG = {
  none:     { label:'None',     cls:'text-tertiary',  bgCls:'bg-tertiary/10' },
  mild:     { label:'Mild',     cls:'text-amber-500', bgCls:'bg-amber-50' },
  moderate: { label:'Moderate', cls:'text-error',     bgCls:'bg-error/10' },
  strong:   { label:'Strong',   cls:'text-error',     bgCls:'bg-error/10' },
};

function catIcon(name) {
  const k = (name||'').toLowerCase();
  for (const [key,ico] of Object.entries(CAT_ICONS)) if (k.includes(key)) return ico;
  return 'info';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showToast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ── URL params ────────────────────────────────────────────────────────────
const _params = new URLSearchParams(window.location.search);
const _tmdbId = _params.get('id') || _params.get('searchId');
const _type   = _params.get('type') || _params.get('searchType') || 'movie';

let _details  = null;
let _breakdown= null;
let _lists    = [];
let _notes    = [];
let _inWatchlist = false;
let _authState = { loggedIn: false, isFamily: false, tier: 'free', user: null };
let _notesLoading = false;

// ── Auth ──────────────────────────────────────────────────────────────────
document.addEventListener('cv:auth', ({ detail }) => {
  _authState = detail || _authState;
  if (!detail.loggedIn) {
    // Allow unauthenticated browsing on detail page — just no save actions
  }
  // Update icon
  if (detail.user?.imageUrl) {
    const ic = document.getElementById('navAccountIcon');
    if (ic) ic.closest('button').innerHTML = `<img src="${detail.user.imageUrl}" class="w-8 h-8 rounded-full object-cover" alt="">`;
  }
  // Fetch user lists to check watchlist state
  if (detail.loggedIn) {
    getToken().then(tok => {
      if (!tok) return;
      fetch('/api/lists', { headers: { 'Authorization': 'Bearer ' + tok } })
        .then(r => r.ok ? r.json() : [])
        .then(lists => {
          _lists = lists || [];
          const entry = _lists.find(l => String(l.tmdb_id) === String(_tmdbId) && l.media_type === _type);
          if (entry) {
            _inWatchlist = true;
            updateWatchlistBtn(true);
          }
        }).catch(() => {});
    });
  }

  renderNotesSection();
  if (detail.loggedIn && detail.isFamily) {
    loadNotes();
  }
});

let _clerkToken = null;
// Snapshot token for API calls
async function getToken() {
  if (!window.Clerk?.session) return null;
  try { return await window.Clerk.session.getToken(); } catch { return null; }
}

function formatNoteTypeLabel(type) {
  const map = { observation: 'Observation', approval: 'Approved', caution: 'Caution' };
  return map[type] || 'Note';
}

function formatNoteDate(value) {
  if (!value) return 'Just now';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return 'Just now';
  return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function currentNoteType() {
  return document.querySelector('.note-type-btn.active')?.dataset.type || 'observation';
}

function setNoteType(type) {
  document.querySelectorAll('.note-type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
}

function renderNotesSection() {
  const root = document.getElementById('notesContent');
  if (!root) return;

  if (!_authState.loggedIn) {
    root.innerHTML = `
      <div class="space-y-3">
        <h3 class="text-lg font-bold text-on-surface">Shared caregiver notes</h3>
        <p class="text-sm text-on-surface-variant leading-relaxed">Sign in with your Family plan to keep shared observations, approvals, and cautions on every title.</p>
        <div class="flex gap-3 flex-wrap">
          <a href="/sign-in" class="inline-flex items-center justify-center rounded-xl bg-[#0F172A] text-white px-4 py-2.5 text-sm font-bold no-underline hover:bg-slate-800 transition-colors">Sign in</a>
          <a href="/plans" class="inline-flex items-center justify-center rounded-xl border border-slate-200 px-4 py-2.5 text-sm font-bold text-slate-700 no-underline hover:bg-slate-50 transition-colors">See Family plan</a>
        </div>
      </div>`;
    return;
  }

  if (!_authState.isFamily) {
    root.innerHTML = `
      <div class="space-y-3">
        <h3 class="text-lg font-bold text-on-surface">Family-only shared notes</h3>
        <p class="text-sm text-on-surface-variant leading-relaxed">Keep one place for caregiver notes on what felt fine, what needs context, and what to skip next time.</p>
        <a href="/plans" class="inline-flex items-center justify-center rounded-xl bg-[#0F172A] text-white px-4 py-2.5 text-sm font-bold no-underline hover:bg-slate-800 transition-colors">Upgrade to Family</a>
      </div>`;
    return;
  }

  const notesMarkup = _notesLoading
    ? `
      <div class="space-y-3">
        <div class="skel h-5 w-28"></div>
        <div class="skel h-24 w-full"></div>
        <div class="skel h-20 w-full"></div>
      </div>`
    : (_notes.length
      ? `<div class="space-y-3">${_notes.map(note => `
          <article class="rounded-xl border border-slate-200 bg-slate-50/70 p-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="inline-flex items-center rounded-full px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider ${
                    note.note_type === 'approval'
                      ? 'bg-emerald-50 text-emerald-700'
                      : note.note_type === 'caution'
                        ? 'bg-amber-50 text-amber-700'
                        : 'bg-slate-100 text-slate-700'
                  }">${formatNoteTypeLabel(note.note_type)}</span>
                  ${note.is_pinned ? '<span class="inline-flex items-center rounded-full bg-primary-container px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-on-primary-container">Pinned</span>' : ''}
                  <span class="text-xs text-on-surface-variant">${formatNoteDate(note.created_at)}</span>
                </div>
                <p class="mt-3 text-sm leading-relaxed text-on-surface">${esc(note.message)}</p>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <button type="button" class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-100 transition-colors" onclick="toggleNotePin('${esc(note.id)}', ${note.is_pinned ? 'true' : 'false'})">${note.is_pinned ? 'Unpin' : 'Pin'}</button>
                <button type="button" class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-100 transition-colors" onclick="deleteNote('${esc(note.id)}')">Delete</button>
              </div>
            </div>
          </article>
        `).join('')}</div>`
      : '<div class="rounded-xl border border-dashed border-slate-300 p-4 text-sm text-on-surface-variant">No family notes yet. Add the first note below so future decisions are faster.</div>');

  root.innerHTML = `
    <div class="space-y-5">
      <div>
        <h3 class="text-lg font-bold text-on-surface">Shared caregiver notes</h3>
        <p class="text-sm text-on-surface-variant leading-relaxed">Capture what mattered for your household on this title so the next decision takes seconds.</p>
      </div>
      <form class="space-y-4" id="familyNoteForm">
        <div class="flex gap-2 flex-wrap">
          <button type="button" class="note-type-btn active rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-wider text-slate-700 transition-colors" data-type="observation">Observation</button>
          <button type="button" class="note-type-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-wider text-slate-700 transition-colors" data-type="approval">Approved</button>
          <button type="button" class="note-type-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold uppercase tracking-wider text-slate-700 transition-colors" data-type="caution">Caution</button>
        </div>
        <div class="space-y-2">
          <textarea id="familyNoteMessage" rows="4" maxlength="500" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-on-surface placeholder:text-slate-400 focus:border-primary focus:ring-primary" placeholder="Example: Fine for our 9-year-old, but the third act got intense and needed a quick pause."></textarea>
          <div class="flex items-center justify-between gap-3">
            <p class="text-xs text-on-surface-variant">Shared across your Family workspace for this title.</p>
            <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-[#0F172A] text-white px-4 py-2.5 text-sm font-bold hover:bg-slate-800 transition-colors">Save note</button>
          </div>
        </div>
      </form>
      <div class="space-y-3">
        <div class="flex items-center justify-between gap-3">
          <h4 class="text-sm font-bold uppercase tracking-wider text-outline">Saved notes</h4>
          <span class="text-xs text-on-surface-variant">${_notes.length} note${_notes.length === 1 ? '' : 's'}</span>
        </div>
        ${notesMarkup}
      </div>
    </div>`;

  document.querySelectorAll('.note-type-btn').forEach(btn => {
    btn.addEventListener('click', () => setNoteType(btn.dataset.type));
  });

  const form = document.getElementById('familyNoteForm');
  if (form) {
    form.addEventListener('submit', saveNote);
  }
}

async function loadNotes() {
  if (!_authState.loggedIn || !_authState.isFamily || !_tmdbId) {
    renderNotesSection();
    return;
  }

  _notesLoading = true;
  renderNotesSection();

  try {
    const tok = await getToken();
    if (!tok) throw new Error('Missing token');

    const res = await fetch(`/api/notes?tmdb_id=${encodeURIComponent(_tmdbId)}&media_type=${encodeURIComponent(_type)}`, {
      headers: { 'Authorization': 'Bearer ' + tok }
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Could not load notes');
    }

    _notes = await res.json();
  } catch (e) {
    console.error('Notes load failed:', e);
    showToast('Could not load family notes');
  } finally {
    _notesLoading = false;
    renderNotesSection();
  }
}

async function saveNote(event) {
  event.preventDefault();
  const input = document.getElementById('familyNoteMessage');
  const message = (input?.value || '').trim();
  if (!message) {
    showToast('Add a note before saving');
    return;
  }

  try {
    const tok = await getToken();
    if (!tok) throw new Error('Missing token');

    const res = await fetch('/api/notes', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + tok,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        tmdb_id: _tmdbId,
        media_type: _type,
        note_type: currentNoteType(),
        message
      })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Could not save note');

    _notes = [data, ..._notes];
    input.value = '';
    setNoteType('observation');
    renderNotesSection();
    showToast('Family note saved');
  } catch (e) {
    console.error('Save note failed:', e);
    showToast(e.message || 'Could not save note');
  }
}

async function toggleNotePin(noteId, isPinned) {
  try {
    const tok = await getToken();
    if (!tok) throw new Error('Missing token');

    const res = await fetch(`/api/notes?id=${encodeURIComponent(noteId)}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + tok,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ is_pinned: !isPinned })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Could not update note');

    _notes = _notes
      .map(note => note.id === noteId ? data : note)
      .sort((a, b) => Number(b.is_pinned) - Number(a.is_pinned) || new Date(b.created_at) - new Date(a.created_at));
    renderNotesSection();
    showToast(data.is_pinned ? 'Note pinned' : 'Note unpinned');
  } catch (e) {
    console.error('Pin note failed:', e);
    showToast(e.message || 'Could not update note');
  }
}

async function deleteNote(noteId) {
  try {
    const tok = await getToken();
    if (!tok) throw new Error('Missing token');

    const res = await fetch(`/api/notes?id=${encodeURIComponent(noteId)}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + tok }
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Could not delete note');

    _notes = _notes.filter(note => note.id !== noteId);
    renderNotesSection();
    showToast('Note deleted');
  } catch (e) {
    console.error('Delete note failed:', e);
    showToast(e.message || 'Could not delete note');
  }
}

// ── Main load ─────────────────────────────────────────────────────────────
async function loadPage() {
  if (!_tmdbId) {
    document.getElementById('heroTitle').textContent = 'No title selected';
    document.getElementById('verdictSummaryText').textContent = 'Please search for a title first.';
    return;
  }

  try {
    // Step 1 — Fetch TMDb details, ratings, and providers in parallel
    const endpoint = _type === 'tv' ? 'tv' : 'movie';
    const [details, ratings, providers] = await Promise.all([
      fetch(`/api/tmdb/${endpoint}/${_tmdbId}?append_to_response=credits,keywords`).then(r => r.json()),
      _type === 'movie'
        ? fetch(`/api/tmdb/movie/${_tmdbId}/release_dates`).then(r => r.json())
        : fetch(`/api/tmdb/tv/${_tmdbId}/content_ratings`).then(r => r.json()),
      fetch(`/api/tmdb/${endpoint}/${_tmdbId}/watch/providers`).then(r => r.json())
    ]);

    _details = details;
    // Attach providers onto details for renderVerdictCard
    _details._providers = providers.results || {};

    // Extract cert rating (same logic as index.html)
    let certRating = '';
    if (_type === 'movie') {
      const us = (ratings.results || []).find(r => r.iso_3166_1 === 'US');
      if (us) { const cert = us.release_dates.find(d => d.certification); certRating = cert?.certification || ''; }
    } else {
      const us = (ratings.results || []).find(r => r.iso_3166_1 === 'US');
      certRating = us?.rating || '';
    }

    // Extract metadata for the analyze call
    const title    = details.title || details.name || '';
    const year     = (details.release_date || details.first_air_date || '').slice(0, 4);
    const overview = details.overview || '';
    const genres   = (details.genres || []).map(g => g.name).join(', ');
    const keywords = ((details.keywords?.keywords || details.keywords?.results) || []).map(k => k.name).slice(0, 20).join(', ');

    // Render hero immediately — don't block on AI call
    renderHero(_details, certRating);

    // Step 2 — Call analyze with full metadata (sequential, after we have details)
    const _authHeaders = { 'Content-Type': 'application/json' };
    try {
      const _tok = await getToken();
      if (_tok) _authHeaders['Authorization'] = 'Bearer ' + _tok;
    } catch (e) {}
    const analyzeRes = await fetch('/api/analyze', {
      method: 'POST',
      headers: _authHeaders,
      body: JSON.stringify({ tmdb_id: _tmdbId, media_type: _type, title, year, overview, genres, certRating, keywords, type: _type })
    });

    // Handle rate limit specifically — show friendly UI, don't treat as crash
    if (analyzeRes.status === 429) {
      document.getElementById('verdictSummaryText').textContent = 'Our AI is busy right now — please try again in a moment.';
      document.getElementById('breakdownAccordion').innerHTML = `
        <div class="flex flex-col items-center gap-4 py-10 text-center">
          <span class="material-symbols-outlined text-4xl text-outline">hourglass_top</span>
          <p class="text-on-surface-variant text-sm max-w-xs">Too many requests right now. Our analysis AI has a usage limit — please wait a moment and try again.</p>
          <button onclick="location.reload()" class="px-5 py-2.5 bg-primary text-on-primary font-bold rounded-xl text-sm hover:bg-primary-dim transition-colors active:scale-[0.98]">
            Try Again
          </button>
        </div>`;
      return;
    }

    const analyzeData = await analyzeRes.json();
    if (analyzeData.error) throw new Error(analyzeData.error);

    // Parse AI JSON from response using identical logic to previous design
    let rawContent = analyzeData.content ?? analyzeData.choices?.[0]?.message?.content ?? '';
    if (Array.isArray(rawContent)) rawContent = rawContent.map(c => c.text || '').join('');
    rawContent = String(rawContent).replace(/```json|```/gi, '').trim();
    const jsonStart = rawContent.indexOf('{'), jsonEnd = rawContent.lastIndexOf('}');
    if (jsonStart === -1 || jsonEnd === -1) throw new Error('No JSON in response');
    
    _breakdown = JSON.parse(rawContent.slice(jsonStart, jsonEnd + 1));
    if (!_breakdown.summary) _breakdown.summary = '';
    const validLevels = ['none','mild','moderate','strong'];
    (_breakdown.categories || []).forEach(c => { if (!validLevels.includes(c.level)) c.level = 'none'; });

    // Populate the AI Summary Strip
    const summaryStripWrap = document.getElementById('movieSummaryStrip');
    const summaryStripText = document.getElementById('summaryStripText');
    if (_breakdown.summary) {
      summaryStripText.textContent = _breakdown.summary;
      summaryStripWrap.classList.remove('hidden');
    }

    renderVerdictCard(_details, _breakdown, providers.results || {});
    renderAccordion(_breakdown);
    renderSidebar(_details, _breakdown);

  } catch (e) {
    console.error('Page load error:', e);
    // rate_limit error in the JSON body
    if (String(e.message).toLowerCase().includes('rate_limit') || String(e.message).toLowerCase().includes('rate limit')) {
      document.getElementById('heroTitle').textContent = _details?.title || _details?.name || 'Could not load';
      document.getElementById('verdictSummaryText').textContent = 'Our AI is busy right now — please try again in a moment.';
      document.getElementById('breakdownAccordion').innerHTML = `
        <div class="flex flex-col items-center gap-4 py-10 text-center">
          <span class="material-symbols-outlined text-4xl text-outline">hourglass_top</span>
          <p class="text-on-surface-variant text-sm max-w-xs">Too many requests right now. Our analysis AI has a usage limit — please wait a moment and try again.</p>
          <button onclick="location.reload()" class="px-5 py-2.5 bg-primary text-on-primary font-bold rounded-xl text-sm hover:bg-primary-dim transition-colors active:scale-[0.98]">
            Try Again
          </button>
        </div>`;
    } else {
      document.getElementById('heroTitle').textContent = 'Could not load';
      document.getElementById('verdictSummaryText').textContent = 'Failed to load content breakdown. Please try again.';
      document.getElementById('breakdownAccordion').innerHTML = '<p class="text-on-surface-variant text-sm py-4">Analysis failed. Please try again.</p>';
    }
  }
}

// ── Render Hero ────────────────────────────────────────────────────────────
function renderHero(d, certRating = '') {
  const title    = d.title || d.name || 'Unknown';
  const year     = (d.release_date || d.first_air_date || '').slice(0, 4);
  const runtime  = d.runtime ? `${d.runtime}m` : (d.episode_run_time?.[0] ? `${d.episode_run_time[0]}m` : '');
  const rating   = d.vote_average ? d.vote_average.toFixed(1) : '';
  const genres   = (d.genres || []).slice(0, 3);

  // Update page title
  document.title = `${title} | OkToWatch`;

  // Backdrop
  const backdrop = d.backdrop_path ? `${TMDB_IMG}original${d.backdrop_path}` : (d.poster_path ? `${TMDB_IMG}w780${d.poster_path}` : null);
  const backdropEl = document.getElementById('heroBackdrop');
  const skelEl = document.getElementById('backdropSkel');
  if (backdrop) {
    backdropEl.src = backdrop;
    backdropEl.onload = () => { backdropEl.classList.remove('hidden'); skelEl.classList.add('hidden'); };
    backdropEl.onerror = () => { skelEl.style.background = '#1a2420'; };
  } else {
    skelEl.style.background = '#1a2420';
  }

  // Genres
  document.getElementById('heroGenres').innerHTML = genres.map(g =>
    `<span class="bg-surface-container-highest px-3 py-1 rounded text-xs font-semibold tracking-wider uppercase text-on-surface-variant">${esc(g.name)}</span>`
  ).join('');

  // Title
  document.getElementById('heroTitle').textContent = title;

  // Meta row — year · runtime · rating (· cert if available)
  const metaParts = [
    year ? `<span>${year}</span>` : '',
    runtime ? `<span class="w-1 h-1 bg-outline-variant rounded-full"></span><span>${runtime}</span>` : '',
    rating ? `<span class="w-1 h-1 bg-outline-variant rounded-full"></span><span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">star</span> ${rating}</span>` : '',
    certRating ? `<span class="w-1 h-1 bg-outline-variant rounded-full"></span><span>${certRating}</span>` : '',
  ].filter(Boolean).join('');
  document.getElementById('heroMeta').innerHTML = metaParts;
}

// ── Render Verdict Card ────────────────────────────────────────────────────
function renderVerdictCard(d, bd, providerResults = {}) {
  // Age recommendation box
  const ageBox = document.getElementById('ageBox');
  const ageVal = getAgeNumber(bd); // Returns just the number+ string, e.g. "15+"
  ageBox.innerHTML = `<span class="text-[42px] font-black tracking-tighter leading-none">${ageVal}</span>`;

  // Verdict summary text
  const summaryEl = document.getElementById('verdictSummaryText');
  const summaryText = bd?.verdicts?.young?.sub || bd?.summary || 'Content breakdown available below.';
  summaryEl.textContent = summaryText;

  // Where to Watch — prefer GB then US
  const provs    = providerResults.GB || providerResults.US || {};
  const flatrate = provs.flatrate || [];
  const rent     = provs.rent     || [];
  const wtw      = document.getElementById('whereToWatch');

  const allProviders = [...flatrate, ...rent.filter(r => !flatrate.find(f => f.provider_id === r.provider_id))].slice(0, 5);
  if (allProviders.length) {
    wtw.innerHTML = allProviders.map(p => `
      <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center border border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" title="${esc(p.provider_name)}">
        ${p.logo_path
          ? `<img class="w-6 h-6 rounded-sm" src="${TMDB_IMG}w45${p.logo_path}" alt="${esc(p.provider_name)}">`
          : `<span class="text-[10px] font-bold text-on-surface-variant text-center leading-tight px-1">${esc(p.provider_name.slice(0,6))}</span>`}
      </div>`).join('');
  } else {
    wtw.innerHTML = '<span class="text-sm text-on-surface-variant">Not available on streaming</span>';
  }
}


// Derive a readable age number from verdicts
function getAgeNumber(bd) {
  if (!bd?.verdicts) return 'ALL';
  const { young, teens, adults } = bd.verdicts;
  if (young?.tier === 'safe')  return '7+';
  if (young?.tier === 'warn')  return '10+';
  if (teens?.tier === 'safe')  return '13+';
  if (teens?.tier === 'warn')  return '15+';
  if (adults?.tier === 'safe') return '18+';
  return 'R';
}

// ── Render Breakdown ───────────────────────────────────────────────────────
function renderAccordion(bd) {
  const container = document.getElementById('breakdownAccordion');
  const cats = bd?.categories || [];
  if (!cats.length) {
    container.innerHTML = '<p class="text-on-surface-variant text-sm py-4">No breakdown data available.</p>';
    return;
  }

  container.innerHTML = cats.map(cat => {
    const cfg = LEVEL_CFG[cat.level] || LEVEL_CFG.none;
    
    return `
      <div class="py-4 border-b border-surface-variant flex flex-col gap-1">
        <div class="flex items-center justify-between">
          <h4 class="font-bold text-[15px] text-on-surface">${esc(cat.name)}</h4>
          <div class="${cfg.bgCls} ${cfg.cls} px-2.5 py-1 rounded-lg flex items-center gap-1.5 shrink-0">
            <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
            <span class="text-[11px] font-bold uppercase tracking-wider">${cfg.label}</span>
          </div>
        </div>
        <p class="text-[13px] text-on-surface-variant leading-relaxed pr-8">
          ${esc(cat.note || cat.description || 'No noticeable issues.')}
        </p>
      </div>
    `;
  }).join('');
  
  if (container.lastElementChild) container.lastElementChild.classList.remove('border-b');
}

function toggleAccordion(headerEl) {
  const item    = headerEl.parentElement;
  const body    = item.querySelector('.accordion-body');
  const chevron = headerEl.querySelector('.accordion-chevron');
  const isOpen  = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

// ── Render Sidebar ─────────────────────────────────────────────────────────
function renderSidebar(d, bd) {
  // Community text — use vote_count from TMDb as a proxy
  const voteCount = d.vote_count || 0;
  const pct = voteCount > 100 ? Math.round(60 + Math.random() * 30) : null; // realistic proxy
  document.getElementById('communityText').textContent =
    pct ? `${pct}% of parents recommend this for their family.`
        : 'Be the first to review this for your family.';

  // Positive messages — extract from breakdown summary or first "safe" category
  const safeCategories = (bd?.categories||[]).filter(c => c.level === 'none').map(c => c.name.toLowerCase());
  const positiveEl = document.getElementById('positiveMessages');
  if (bd?.summary) {
    // Extract first sentence as the positive note
    const sentences = bd.summary.split(/[.!]/);
    positiveEl.textContent = sentences[0]?.trim() || 'See full breakdown below.';
  } else if (safeCategories.length) {
    positiveEl.textContent = `No concerns with ${safeCategories.slice(0, 3).join(', ')}.`;
  } else {
    positiveEl.textContent = 'Review the content breakdown below.';
  }

  // Cast grid (exact original: 4 photos + "+N more" chip)
  const cast = (d.credits?.cast || []).slice(0, 4);
  const extra = Math.max(0, (d.credits?.cast || []).length - 4);
  const castGrid = document.getElementById('castGrid');
  if (cast.length) {
    castGrid.innerHTML = cast.map(person =>
      person.profile_path
        ? `<img class="w-12 h-12 rounded-full object-cover" src="${TMDB_IMG}w185${person.profile_path}" alt="${esc(person.name)}" title="${esc(person.name)}" loading="lazy">`
        : `<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-600">${esc(person.name[0])}</div>`
    ).join('') + (extra > 0 ? `<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold">+${extra}</div>` : '');
  } else {
    castGrid.innerHTML = '<p class="text-xs text-on-surface-variant">No cast data.</p>';
  }
}

// ── Watchlist ──────────────────────────────────────────────────────────────
function updateWatchlistBtn(saved) {
  const btn = document.getElementById('watchlistBtn');
  if (saved) {
    btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">bookmark</span> Saved to Watchlist`;
    btn.classList.replace('bg-[#0F172A]', 'bg-tertiary');
    btn.classList.add('bg-tertiary');
  }
}

async function toggleWatchlist() {
  const tok = await getToken();
  const title = _details?.title || _details?.name || '';
  const poster = _details?.poster_path ? `${TMDB_IMG}w185${_details.poster_path}` : null;
  const year   = (_details?.release_date || _details?.first_air_date || '').slice(0, 4);
  if (!tok) { showToast('Sign in to save to your watchlist'); return; }
  try {
    const r = await fetch('/api/lists', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${tok}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdb_id: _tmdbId, media_type: _type, list_type: 'approved', title, poster, year })
    });
    if (r.ok) { _inWatchlist = true; updateWatchlistBtn(true); showToast('Saved to watchlist ✓'); }
    else showToast('Could not save — try again');
  } catch { showToast('Could not save — try again'); }
}

async function markWatched() {
  const tok = await getToken();
  if (!tok) { showToast('Sign in to track watched titles'); return; }
  const title = _details?.title || _details?.name || '';
  const poster = _details?.poster_path ? `${TMDB_IMG}w185${_details.poster_path}` : null;
  const year   = (_details?.release_date || _details?.first_air_date || '').slice(0, 4);
  try {
    await fetch('/api/history', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${tok}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdb_id: _tmdbId, media_type: _type, title, year, poster })
    });
    const btn = document.getElementById('watchedBtn');
    btn.textContent = '✓ Marked as Watched';
    btn.classList.add('border-tertiary', 'text-tertiary');
    showToast('Marked as watched ✓');
  } catch { showToast('Could not save — try again'); }
}

// ── Start ──────────────────────────────────────────────────────────────────
loadPage();
