// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Main load ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
async function loadPage() {
  if (!_tmdbId) {
    document.getElementById('heroTitle').textContent = 'No title selected';
    document.getElementById('verdictSummaryText').textContent = 'Please search for a title first.';
    return;
  }

  try {
    // Step 1 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Fetch TMDb details, ratings, and providers in parallel
    const endpoint = _type === 'tv' ? 'tv' : 'movie';
    const [details, ratings, providers] = await Promise.all([
      fetch(`/api/tmdb/${endpoint}/${_tmdbId}?append_to_response=credits,keywords`).then(r => r.json()),
      _type === 'movie'
        ? fetch(`/api/tmdb/movie/${_tmdbId}/release_dates`).then(r => r.json())
        : fetch(`/api/tmdb/tv/${_tmdbId}/content_ratings`).then(r => r.json()),
      fetch(`/api/tmdb/${endpoint}/${_tmdbId}/watch/providers`).then(r => r.json())
    ]);

    _details = details;
    // Attach providers onto details for renderVerdictCard
    _details._providers = providers.results || {};

    // Extract cert rating (same logic as index.html)
    let certRating = '';
    if (_type === 'movie') {
      const us = (ratings.results || []).find(r => r.iso_3166_1 === 'US');
      if (us) { const cert = us.release_dates.find(d => d.certification); certRating = cert?.certification || ''; }
    } else {
      const us = (ratings.results || []).find(r => r.iso_3166_1 === 'US');
      certRating = us?.rating || '';
    }

    // Extract metadata for the analyze call
    const title    = details.title || details.name || '';
    const year     = (details.release_date || details.first_air_date || '').slice(0, 4);
    const overview = details.overview || '';
    const genres   = (details.genres || []).map(g => g.name).join(', ');
    const keywords = ((details.keywords?.keywords || details.keywords?.results) || []).map(k => k.name).slice(0, 20).join(', ');

    // Render hero immediately ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â don't block on AI call
    renderHero(_details, certRating);

    // Step 2 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Call analyze with full metadata (sequential, after we have details)
    const analyzeRes = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdb_id: _tmdbId, media_type: _type, title, year, overview, genres, certRating, keywords, type: _type })
    });
    const analyzeData = await analyzeRes.json();

    if (analyzeData.error) throw new Error(analyzeData.error);

    // Parse AI JSON from response using identical logic to previous design
    let rawContent = analyzeData.content ?? analyzeData.choices?.[0]?.message?.content ?? '';
    if (Array.isArray(rawContent)) rawContent = rawContent.map(c => c.text || '').join('');
    rawContent = String(rawContent).replace(/```json|```/gi, '').trim();
    const jsonStart = rawContent.indexOf('{'), jsonEnd = rawContent.lastIndexOf('}');
    if (jsonStart === -1 || jsonEnd === -1) throw new Error('No JSON in response');
    
    _breakdown = JSON.parse(rawContent.slice(jsonStart, jsonEnd + 1));
    if (!_breakdown.summary) _breakdown.summary = '';
    const validLevels = ['none','mild','moderate','strong'];
    (_breakdown.categories || []).forEach(c => { if (!validLevels.includes(c.level)) c.level = 'none'; });

    // Populate the AI Summary Strip
    const summaryStripWrap = document.getElementById('movieSummaryStrip');
    const summaryStripText = document.getElementById('summaryStripText');
    if (_breakdown.summary) {
      summaryStripText.textContent = _breakdown.summary;
      summaryStripWrap.classList.remove('hidden');
    }

    renderVerdictCard(_details, _breakdown, providers.results || {});
    renderAccordion(_breakdown);
    renderSidebar(_details, _breakdown);

  } catch (e) {
    console.error('Page load error:', e);
    document.getElementById('heroTitle').textContent = 'Could not load';
    document.getElementById('verdictSummaryText').textContent = 'Failed to load content breakdown. Please try again.';
    document.getElementById('breakdownAccordion').innerHTML = '<p class="text-on-surface-variant text-sm py-4">Analysis failed. Please try again.</p>';
  }
}

function renderHero(d, certRating = '') {
  const title    = d.title || d.name || 'Unknown';
  const year     = (d.release_date || d.first_air_date || '').slice(0, 4);
  const runtime  = d.runtime ? `${d.runtime}m` : (d.episode_run_time?.[0] ? `${d.episode_run_time[0]}m` : '');
  const rating   = d.vote_average ? d.vote_average.toFixed(1) : '';
  const genres   = (d.genres || []).slice(0, 3);

  // Update page title
  document.title = `${title} | OkToWatch`;

  // Backdrop

  const metaParts = [

function renderVerdictCard(d, bd, providerResults = {}) {
  // Age recommendation box
  const ageBox = document.getElementById('ageBox');
  const ageVal = getAgeNumber(bd); // Returns just the number+ string, e.g. "15+"
  ageBox.innerHTML = `<span class="text-[42px] font-black tracking-tighter leading-none">${ageVal}</span>`;

  // Verdict summary text
  const summaryEl = document.getElementById('verdictSummaryText');
  const summaryText = bd?.verdicts?.young?.sub || bd?.summary || 'Content breakdown available below.';
  summaryEl.textContent = summaryText;

  // Where to Watch ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â prefer GB then US
  const provs    = providerResults.GB || providerResults.US || {};
  const flatrate = provs.flatrate || [];
  const rent     = provs.rent     || [];
  const wtw      = document.getElementById('whereToWatch');

  const allProviders = [...flatrate, ...rent.filter(r => !flatrate.find(f => f.provider_id === r.provider_id))].slice(0, 5);
  if (allProviders.length) {
    wtw.innerHTML = allProviders.map(p => `
      <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center border border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" title="${esc(p.provider_name)}">
        ${p.logo_path
          ? `<img class="w-6 h-6 rounded-sm" src="${TMDB_IMG}w45${p.logo_path}" alt="${esc(p.provider_name)}">`
          : `<span class="text-[10px] font-bold text-on-surface-variant text-center leading-tight px-1">${esc(p.provider_name.slice(0,6))}</span>`}
      </div>`).join('');
  } else {
    wtw.innerHTML = '<span class="text-sm text-on-surface-variant">Not available on streaming</span>';
  }
}


// Derive a readable age number from verdicts
function getAgeNumber(bd) {
  if (!bd?.verdicts) return 'ALL';
  const { young, teens, adults } = bd.verdicts;
  if (young?.tier === 'safe')  return '7+';
  if (young?.tier === 'warn')  return '10+';
  if (teens?.tier === 'safe')  return '13+';
  if (teens?.tier === 'warn')  return '15+';
  if (adults?.tier === 'safe') return '18+';
  return 'R';
}

function renderAccordion(bd) {
  const container = document.getElementById('breakdownAccordion');

  if (!cats.length) {
    container.innerHTML = '<p class="text-on-surface-variant text-sm py-4">No breakdown data available.</p>';

}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Render Sidebar ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function renderSidebar(d, bd) {
  // Community text ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â use vote_count from TMDb as a proxy
  const voteCount = d.vote_count || 0;
  const pct = voteCount > 100 ? Math.round(60 + Math.random() * 30) : null; // realistic proxy
  document.getElementById('communityText').textContent =
    pct ? `${pct}% of parents recommend this for their family.`
        : 'Be the first to review this for your family.';

  // Positive messages ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â extract from breakdown summary or first "safe" category
  const safeCategories = (bd?.categories||[]).filter(c => c.level === 'none').map(c => c.name.toLowerCase());
  const positiveEl = document.getElementById('positiveMessages');
  if (bd?.summary) {
    // Extract first sentence as the positive note
    const sentences = bd.summary.split(/[.!]/);
    positiveEl.textContent = sentences[0]?.trim() || 'See full breakdown below.';
  } else if (safeCategories.length) {
    positiveEl.textContent = `No concerns with ${safeCategories.slice(0, 3).join(', ')}.`;
  } else {
    positiveEl.textContent = 'Review the content breakdown below.';
  }

  // Cast grid (exact original: 4 photos + "+N more" chip)
  const cast = (d.credits?.cast || []).slice(0, 4);
  const extra = Math.max(0, (d.credits?.cast || []).length - 4);
  const castGrid = document.getElementById('castGrid');
  if (cast.length) {
    castGrid.innerHTML = cast.map(person =>
      person.profile_path
        ? `<img class="w-12 h-12 rounded-full object-cover" src="${TMDB_IMG}w185${person.profile_path}" alt="${esc(person.name)}" title="${esc(person.name)}" loading="lazy">`
        : `<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-600">${esc(person.name[0])}</div>`
    ).join('') + (extra > 0 ? `<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold">+${extra}</div>` : '');
  } else {
    castGrid.innerHTML = '<p class="text-xs text-on-surface-variant">No cast data.</p>';
  }
}
