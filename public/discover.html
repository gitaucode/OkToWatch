<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2a6b55">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OkToWatch">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<link rel="shortcut icon" href="/favicon.ico">
<title>Discover — OkToWatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #c8d9d1; --surface: #fff; --surface2: #f4f6f5;
  --border: rgba(0,0,0,0.08); --text: #1a2420; --text2: #3d4f49;
  --muted: #7a908a; --accent: #2a6b55; --accent-light: #e4efe9;
  --safe: #2a7d52; --safe-bg: #e6f4ec;
  --warn: #b07a10; --warn-bg: #fef6e4;
  --moderate: #b85c1a; --moderate-bg: #fef0e6;
  --danger: #c0392b; --danger-bg: #fdecea;
  --shadow: 0 4px 16px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px; --radius-sm: 10px;
}
html, body { overflow-x: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }
#nav-root { position: relative; z-index: 10; }

.page-wrap { max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 5rem; }

/* Skeleton */
.skel { background: linear-gradient(90deg, #e8edeb 25%, #f2f5f3 50%, #e8edeb 75%); background-size: 200% 100%; border-radius: 8px; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Header */
.page-header { margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.4s ease forwards 0.05s; }
.page-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
.page-header p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

/* Filters Panel */
.filters-panel {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 1.5rem;
  margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.4s ease forwards 0.1s;
}
.filter-group { margin-bottom: 1.25rem; }
.filter-group:last-child { margin-bottom: 0; }
.filter-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; display: block; }

/* Slider */
.age-slider-wrap { display: flex; align-items: flex-end; gap: 1rem; }
input[type="range"] {
  flex: 1; height: 6px; border-radius: 3px;
  background: linear-gradient(to right, var(--accent-light) 0%, var(--accent) 100%);
  border: none; outline: none; -webkit-appearance: none; appearance: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
input[type="range"]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%; border: none;
  background: var(--accent); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.age-display {
  font-size: 1.25rem; font-weight: 700; color: var(--accent);
  min-width: 45px; text-align: center;
}

/* Genre buttons */
.genre-buttons {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
}
.genre-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text2); padding: 0.45rem 1rem; border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.genre-btn:hover { border-color: var(--accent); color: var(--accent); }
.genre-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Content type */
.type-buttons {
  display: flex; gap: 0.5rem;
}
.type-btn {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text2); padding: 0.6rem; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Checkbox */
.checkbox-wrap { display: flex; align-items: center; gap: 0.6rem; }
input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.checkbox-label { font-size: 0.88rem; cursor: pointer; }

/* Search button */
.btn-search {
  background: var(--accent); color: white; border: none;
  padding: 0.65rem 1.5rem; border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; width: 100%; transition: opacity 0.15s; margin-top: 0.25rem;
}
.btn-search:hover { opacity: 0.88; }
.btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

/* Results */
.results-section {
  opacity: 0; animation: fadeUp 0.4s ease forwards 0.15s;
}
.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.results-title { font-size: 0.95rem; font-weight: 700; }
.results-count { font-size: 0.78rem; color: var(--muted); }

/* Grid */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
}

.result-card {
  background: var(--surface); border-radius: var(--radius-sm);
  overflow: hidden; box-shadow: var(--shadow);
  cursor: pointer; transition: all 0.15s;
  border: 1.5px solid transparent;
}
.result-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.result-poster {
  width: 100%; aspect-ratio: 2/3; overflow: hidden;
  background: var(--bg); display: flex; align-items: center;
  justify-content: center; font-size: 2rem;
}
.result-poster img { width: 100%; height: 100%; object-fit: cover; }

.result-info { padding: 0.75rem; }
.result-title {
  font-size: 0.8rem; font-weight: 700;
  line-height: 1.3; overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
}
.result-meta {
  font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem;
}
.result-verdict {
  font-size: 0.68rem; color: var(--accent); font-weight: 600;
  margin-top: 0.3rem; text-transform: capitalize;
}

/* Loading */
.loading { text-align: center; padding: 2rem; color: var(--muted); }
.empty-state {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 3rem 2rem; text-align: center;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
.empty-state p { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

/* Footer */
footer {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.75rem; max-width: 1100px; margin: 0 auto;
  padding: 1.5rem 1.25rem; border-top: 1px solid rgba(0,0,0,0.08);
}
footer p, footer a { font-size: 0.75rem; color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--accent); }
.footer-logo { display: flex; align-items: center; gap: 0.45rem; text-decoration: none; }
.footer-logo-mark { width: 22px; height: 22px; border-radius: 6px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
.footer-logo-text { font-size: 0.88rem; color: var(--text); display: inline-flex; align-items: center; gap: 0.4rem; }
.footer-logo-text strong { font-weight: 700; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 599px) {
  .page-wrap { padding: 1.25rem 0.85rem 4rem; }
  .page-header h1 { font-size: 1.25rem; }
  .results-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; }
}
</style>
</head>
<body data-page="discover">

<div id="nav-root"></div>

<div class="page-wrap">
  <div class="page-header">
    <h1>Find Safe Content</h1>
    <p>Discover movies and TV shows based on your child's age and interests. All recommendations are filtered for safety.</p>
  </div>

  <div class="filters-panel">
    <div class="filter-group">
      <label for="ageSlider" class="filter-label">Child's Age</label>
      <div class="age-slider-wrap">
        <input type="range" id="ageSlider" min="0" max="18" value="8" onchange="updateAge(this.value)">
        <div class="age-display" id="ageDisplay">8</div>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Content Type</label>
      <div class="type-buttons">
        <button class="type-btn active" data-type="movie" onclick="setType(this,'movie')">Movies</button>
        <button class="type-btn" data-type="tv" onclick="setType(this,'tv')">TV Shows</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Interests</label>
      <div class="genre-buttons" id="genreButtons"></div>
    </div>

    <div class="filter-group">
      <div class="checkbox-wrap">
        <input type="checkbox" id="safeOnly" checked>
        <label for="safeOnly" class="checkbox-label">Show only verified safe content</label>
      </div>
    </div>

    <button class="btn-search" onclick="search()">Search</button>
  </div>

  <div class="results-section" id="resultsSection" style="display:none;">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">Recommendations</div>
      <div class="results-count" id="resultsCount">—</div>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <div id="loadingState" style="display:none;" class="loading">
    Searching...
  </div>

  <div id="emptyState" style="display:none;" class="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>No results found</h3>
    <p>Try adjusting your filters or search criteria.</p>
  </div>
</div>

<footer>
  <a class="footer-logo" href="/index">
    <div class="footer-logo-mark">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="white"/><path d="M8 2C4.5 2 1.5 4.5 1 8c.5 3.5 3.5 6 7 6s6.5-2.5 7-6c-.5-3.5-3.5-6-7-6z" stroke="white" stroke-width="1.5" fill="none"/></svg>
    </div>
    <span class="footer-logo-text">Ok<strong>ToWatch</strong></span>
  </a>
  <div style="display:flex;gap:1.25rem;flex-wrap:wrap;justify-content:center;">
    <a href="/about">About</a>
    <a href="/privacy">Privacy</a>
    <a href="/plans">Plans</a>
  </div>
  <p>© 2026 OkToWatch</p>
</footer>

<script src="/js/auth.js?v=aea3acb"></script>
<script>
const API = location.hostname === 'localhost' ? 'http://localhost:8787' : '';
const TMDB_LOGO = 'https://image.tmdb.org/t/p/original';

const GENRES = {
  movie: {
    28: 'Action', 12: 'Adventure', 16: 'Animation', 35: 'Comedy',
    80: 'Crime', 18: 'Drama', 10751: 'Family', 14: 'Fantasy',
    27: 'Horror', 36: 'History', 10402: 'Music', 9648: 'Mystery',
    10749: 'Romance', 878: 'Sci-Fi', 53: 'Thriller', 10752: 'War', 37: 'Western'
  },
  tv: {
    10759: 'Action & Adventure', 16: 'Animation', 35: 'Comedy', 80: 'Crime',
    18: 'Drama', 10751: 'Family', 10762: 'Kids', 9648: 'Mystery',
    10763: 'News', 10764: 'Reality', 10765: 'Sci-Fi & Fantasy', 10766: 'Soap',
    10767: 'Talk', 10768: 'War & Politics', 37: 'Western'
  }
};

let currentAge = 8;
let selectedGenres = [];
let currentType = 'movie';

function updateAge(val) {
  currentAge = parseInt(val);
  document.getElementById('ageDisplay').textContent = val;
}

function setType(btn, type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGenreButtons();
}

function renderGenreButtons() {
  const genres = GENRES[currentType];
  const buttons = document.getElementById('genreButtons');
  buttons.innerHTML = Object.entries(genres).map(([id, name]) => 
    `<button class="genre-btn${selectedGenres.includes(id) ? ' active' : ''}" onclick="toggleGenre(this,'${id}','${name}')">${name}</button>`
  ).join('');
}

function toggleGenre(btn, id, name) {
  if (selectedGenres.includes(id)) {
    selectedGenres = selectedGenres.filter(g => g !== id);
    btn.classList.remove('active');
  } else {
    selectedGenres.push(id);
    btn.classList.add('active');
  }
}

async function search() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Searching...';

  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';

  try {
    const token = await window.Clerk.session.getToken();
    const params = new URLSearchParams({
      age: currentAge,
      genres: selectedGenres.join(','),
      safeOnly: document.getElementById('safeOnly').checked,
      type: currentType,
    });

    const res = await fetch(`${API}/api/discover?${params}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    document.getElementById('loadingState').style.display = 'none';

    if (data.results && data.results.length > 0) {
      renderResults(data.results);
      document.getElementById('resultsSection').style.display = 'block';
      document.getElementById('resultsCount').textContent = `${data.results.length} results`;
    } else {
      document.getElementById('emptyState').style.display = 'block';
    }
  } catch (e) {
    console.error('Search error:', e);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function renderResults(results) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = results.map(item => {
    const poster = item.poster_path ? `<img src="${TMDB_LOGO}/w200${item.poster_path}" alt="${item.title || item.name}">` : '🎬';
    const title = item.title || item.name;
    const year = (item.release_date || item.first_air_date || '').slice(0, 4);
    const verdict = item.cached_verdict ? `Safe for ${currentAge}+` : 'Not analyzed';

    return `
      <div class="result-card" onclick="openTitle('${item.id}','${currentType}')">
        <div class="result-poster">${poster}</div>
        <div class="result-info">
          <div class="result-title">${title}</div>
          <div class="result-meta">${year}</div>
          ${item.cached_verdict ? `<div class="result-verdict">✓ Safe</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openTitle(id, type) {
  window.location.href = `/index?id=${id}&type=${type}`;
}

// Initialize on auth
document.addEventListener('cv:auth', ({ detail }) => {
  if (detail.loggedIn) {
    renderGenreButtons();
  } else {
    window.location.href = '/signin?redirect=/discover';
  }
});
</script>
</body>
</html>
