<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<!-- Clerk preload — start fetching before anything else -->
<link rel="preconnect" href="https://thorough-anteater-20.clerk.accounts.dev" crossorigin/>
<link rel="dns-prefetch" href="https://thorough-anteater-20.clerk.accounts.dev"/>
<link rel="preload" href="https://thorough-anteater-20.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" as="script" crossorigin/>
<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://thorough-anteater-20.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
  s.setAttribute('data-clerk-publishable-key', 'pk_test_dGhvcm91Z2gtYW50ZWF0ZXItMjAuY2xlcmsuYWNjb3VudHMuZGV2JA');
  s.async = true;
  window.__clerkScriptPromise = new Promise(function(res, rej) { s.onload = res; s.onerror = rej; });
  document.head.appendChild(s);
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#565e74"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="OkToWatch"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png"/>
<link rel="shortcut icon" href="/favicon.ico"/>
<title>Sign In — OkToWatch</title>
<meta name="description" content="Sign in to OkToWatch to access your family's movie guides, watchlists, and child profiles."/>
<meta property="og:image" content="https://oktowatch.com/og-image.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://oktowatch.com/og-image.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="/js/tailwind-theme.js"></script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

  /* Shimmer skeleton */
  .skel {
    background: linear-gradient(90deg, #ebeef0 25%, #f2f4f5 50%, #ebeef0 75%);
    background-size: 200% 100%;
    border-radius: 10px;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Clerk host: hidden until loaded */
  .clerk-host { display: none; }
  .clerk-host.ready { display: block; animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* Fade-up */
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { opacity: 0; animation: fadeUp 0.35s ease forwards; }

  /* Reason banner */
  #reasonBanner { display: none; }
  #reasonBanner.visible { display: flex; }

  /* nav-root: hide until auth loads */
  #nav-root * { visibility: hidden !important; }
</style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col" data-page="signin">

<div id="nav-root"></div>

<!-- Background blobs -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden" aria-hidden="true">
  <div class="absolute -top-32 -right-32 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-tertiary/5 rounded-full blur-3xl"></div>
</div>

<!-- Main auth content -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 relative z-10">

  <!-- Reason banner (e.g. ?reason=pro) -->
  <div id="reasonBanner"
       class="fade-up w-full max-w-md mb-5 bg-primary/10 border border-primary/20 rounded-xl px-4 py-3 items-center gap-3 text-sm font-semibold text-primary"
       style="animation-delay:0s;">
    <span class="material-symbols-outlined text-[18px]">lock_open</span>
    <span id="reasonText"></span>
  </div>

  <!-- Logo + heading -->
  <div class="fade-up text-center mb-8 w-full max-w-md" style="animation-delay:0.02s;">
    <!-- Logo -->
    <a href="/index" class="inline-flex items-center gap-2 mb-6 group">
      <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center flex-shrink-0 group-hover:bg-primary-dim transition-colors">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="white"/>
          <path d="M8 2C4.5 2 1.5 4.5 1 8c.5 3.5 3.5 6 7 6s6.5-2.5 7-6c-.5-3.5-3.5-6-7-6z" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <span class="font-headline text-lg font-extrabold tracking-tighter text-on-surface">Ok<span class="text-primary">ToWatch</span></span>
    </a>
    <h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">Welcome back</h1>
    <p class="text-on-surface-variant text-sm leading-relaxed">Sign in to access your family's movie guides and lists.</p>
  </div>

  <!-- Auth card -->
  <div class="fade-up w-full max-w-md" style="animation-delay:0.06s;">
    <div class="bg-surface-container-lowest border border-outline-variant/20 rounded-2xl shadow-[0_10px_40px_-10px_rgba(86,94,116,0.12)]">

      <!-- Skeleton shown while Clerk loads -->
      <div id="clerkSkeleton" class="p-8 space-y-4">
        <p class="slow-msg hidden text-center text-xs text-on-surface-variant py-2">Taking longer than usual… check your connection.</p>
        <!-- Social button skeletons -->
        <div class="grid grid-cols-2 gap-3">
          <div class="skel h-11 rounded-xl"></div>
          <div class="skel h-11 rounded-xl"></div>
        </div>
        <!-- Divider -->
        <div class="relative flex items-center gap-3 py-1">
          <div class="flex-1 h-px bg-outline-variant/20"></div>
          <div class="skel h-3 w-24 rounded-full"></div>
          <div class="flex-1 h-px bg-outline-variant/20"></div>
        </div>
        <!-- Field skeletons -->
        <div class="skel h-3 w-28 rounded-full"></div>
        <div class="skel h-11 rounded-xl"></div>
        <div class="flex justify-between items-center">
          <div class="skel h-3 w-20 rounded-full"></div>
          <div class="skel h-3 w-24 rounded-full"></div>
        </div>
        <div class="skel h-11 rounded-xl"></div>
        <!-- Submit skeleton -->
        <div class="skel h-12 rounded-xl mt-2"></div>
        <!-- Footer -->
        <div class="skel h-3 w-48 rounded-full mx-auto mt-2"></div>
      </div>

      <!-- Clerk mounts here -->
      <div class="clerk-host" id="clerk-signin"></div>

    </div>
  </div>

  <!-- Plans nudge below card -->
  <div class="fade-up w-full max-w-md mt-5" style="animation-delay:0.1s;">
    <div class="flex items-center gap-3 bg-surface-container border border-outline-variant/15 rounded-xl px-4 py-3 text-sm text-on-surface-variant">
      <span class="text-base flex-shrink-0">✨</span>
      <span>Sign in to your account. Upgrade to <a href="/plans" class="text-primary font-semibold hover:underline underline-offset-2">Pro or Family</a> to save lists and manage profiles.</span>
    </div>
  </div>

</main>

<!-- Footer -->
<div id="footer-root"></div>

<script>
(function () {
  const params   = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || '/dashboard';
  const reason   = params.get('reason');

  if (reason === 'pro') {
    const banner = document.getElementById('reasonBanner');
    document.getElementById('reasonText').textContent =
      'That feature requires Pro or Family. Sign in to continue.';
    banner.classList.add('visible');
  }

  function showClerk() {
    document.getElementById('clerkSkeleton').style.display = 'none';
    document.getElementById('clerk-signin').classList.add('ready');
  }

  async function boot() {
    const slowTimer = setTimeout(() => {
      const sk  = document.getElementById('clerkSkeleton');
      if (sk && sk.style.display !== 'none') {
        const msg = sk.querySelector('.slow-msg');
        if (msg) msg.classList.remove('hidden');
      }
    }, 3000);

    await window.__clerkScriptPromise;
    clearTimeout(slowTimer);
    await window.Clerk.load();

    if (window.Clerk.user) {
      if (params.get('plan')) {
        const plan  = params.get('plan');
        const cycle = params.get('cycle') || 'monthly';
        window.location.href = `/plans?autoCheckout=${plan}&cycle=${cycle}`;
      } else {
        window.location.href = redirect || '/dashboard';
      }
      return;
    }

    window.Clerk.mountSignIn(document.getElementById('clerk-signin'), {
      afterSignInUrl: redirect || '/dashboard',
      signUpUrl: '/signup',
      appearance: {
        variables: {
          colorPrimary:    '#565e74',
          colorBackground: '#ffffff',
          colorText:       '#2d3336',
          borderRadius:    '12px',
          fontFamily:      'Inter, sans-serif',
          fontSize:        '15px',
        },
        elements: {
          card:              { boxShadow: 'none', borderRadius: '0', padding: '2rem' },
          headerTitle:       { display: 'none' },
          headerSubtitle:    { display: 'none' },
          formButtonPrimary: {
            backgroundColor: '#565e74',
            fontFamily:      'Plus Jakarta Sans, sans-serif',
            fontWeight:      '700',
            borderRadius:    '12px',
            textTransform:   'none',
          },
          footerActionLink:  { color: '#565e74', fontWeight: '600' },
          socialButtonsBlockButton: { borderRadius: '12px' },
          formFieldInput:    { borderRadius: '12px' },
        }
      }
    });

    // Poll until card appears, then swap skeleton → real form
    const poll = setInterval(() => {
      const card = document.querySelector('#clerk-signin .cl-card, #clerk-signin [data-localization-key]');
      if (card) { clearInterval(poll); showClerk(); }
    }, 80);

    // Hard fallback after 2.5s
    setTimeout(() => { clearInterval(poll); showClerk(); }, 2500);
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', boot)
    : boot();
})();
</script>
<script src="/js/auth.js?v=20260405"></script>
</body>
</html>
