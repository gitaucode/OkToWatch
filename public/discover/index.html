<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Discover | OkToWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/js/tailwind-theme.js"></script>

</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col" data-page="discover">

<!-- Hidden Nav Root for auth.js to attach to -->
<div id="nav-root"></div>



<!-- Main Content Layout -->
<main class="pt-16 flex-grow flex w-full max-w-[1440px] mx-auto">
  <!-- Sidebar Filters -->
  <aside class="w-64 border-r border-slate-200/60 p-8 hidden md:block shrink-0 h-[calc(100vh-4rem)] sticky top-16 overflow-y-auto">
    <div class="space-y-8">
      <div>
        <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4">Age Rating</h3>
        <div class="space-y-3" id="ageFilters">
          <label class="flex items-center gap-3 cursor-pointer group">
            <input name="age-rating" value="18" class="rounded-full border-outline-variant text-primary focus:ring-primary age-cb" type="radio" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">All Ages</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input name="age-rating" value="8" class="rounded-full border-outline-variant text-primary focus:ring-primary age-cb" type="radio" checked onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">8+ (PG)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input name="age-rating" value="12" class="rounded-full border-outline-variant text-primary focus:ring-primary age-cb" type="radio" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">12+</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input name="age-rating" value="15" class="rounded-full border-outline-variant text-primary focus:ring-primary age-cb" type="radio" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">15+</span>
          </label>
        </div>
      </div>
      <div>
        <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4">Genre</h3>
        <div class="space-y-3" id="genreFilters">
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary genre-cb" type="checkbox" value="28" checked onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Action</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary genre-cb" type="checkbox" value="12" checked onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Adventure</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary genre-cb" type="checkbox" value="35" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Comedy</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary genre-cb" type="checkbox" value="878" checked onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Sci-Fi</span>
          </label>
        </div>
      </div>
      <div>
        <h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4">Streaming</h3>
        <div class="space-y-3" id="streamingFilters">
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox" value="disney" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Disney+</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox" value="netflix" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Netflix</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <input class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox" value="amazon" onchange="runDiscover()"/>
            <span class="text-sm text-on-surface group-hover:text-primary transition-colors">Prime Video</span>
          </label>
        </div>
      </div>
    </div>
  </aside>

  <!-- Results Canvas -->
  <section class="flex-grow p-8 bg-surface min-h-[calc(100vh-4rem)]">
    <header class="mb-10 block" id="resultsHeader">
      <p class="text-sm text-on-surface-variant mb-1 font-medium">Smart Recommendations for</p>
      <h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface">Discover Top Picks</h2>
      <p class="text-xs text-on-surface-variant mt-2" id="resultsSubtext">Loading results...</p>
    </header>

    <!-- Results High-Density List -->
    <div class="space-y-1" id="resultsContainer">
      <!-- Skeleton loader initially -->
      <div class="flex items-center gap-6 p-4 border-b border-outline-variant/10">
        <div class="w-20 h-28 skel rounded-xl shrink-0"></div>
        <div class="flex-grow space-y-2">
          <div class="skel h-6 w-1/3"></div>
          <div class="skel h-4 w-1/4"></div>
        </div>
      </div>
      <div class="flex items-center gap-6 p-4 border-b border-outline-variant/10">
        <div class="w-20 h-28 skel rounded-xl shrink-0"></div>
        <div class="flex-grow space-y-2">
          <div class="skel h-6 w-1/3"></div>
          <div class="skel h-4 w-1/4"></div>
        </div>
      </div>
    </div>

    <!-- Pagination View More -->
    <div class="mt-12 flex justify-center hidden" id="loadMoreContainer">
      <button onclick="loadMore()" class="px-8 py-3 bg-surface-container-high text-primary font-bold rounded-lg hover:bg-surface-container-highest transition-colors">
        Load More Results
      </button>
    </div>
  </section>
</main>

<!-- Footer Component -->
<div id="footer-root"></div>

<script src="/js/auth.js?v=20260405"></script>
<script>
  let currentPage = 1;
  let currentResults = [];
  let isFetching = false;

  async function runDiscover(page = 1) {
    if (isFetching) return;
    isFetching = true;
    
    if (page === 1) {
      document.getElementById('resultsContainer').innerHTML = `
        <div class="flex items-center gap-6 p-4 border-b border-outline-variant/10">
          <div class="w-20 h-28 skel rounded-xl shrink-0"></div><div class="flex-grow space-y-2"><div class="skel h-6 w-1/3"></div><div class="skel h-4 w-1/4"></div></div>
        </div>
        <div class="flex items-center gap-6 p-4 border-b border-outline-variant/10">
          <div class="w-20 h-28 skel rounded-xl shrink-0"></div><div class="flex-grow space-y-2"><div class="skel h-6 w-1/3"></div><div class="skel h-4 w-1/4"></div></div>
        </div>
      `;
      document.getElementById('loadMoreContainer').classList.add('hidden');
    }

    try {
      const token = window.Clerk?.session ? await window.Clerk.session.getToken() : null;
      
      // Collect query params
      const selectedAge = document.querySelector('input[name="age-rating"]:checked')?.value || '8';
      const selectedGenres = Array.from(document.querySelectorAll('.genre-cb:checked')).map(cb => cb.value).join(',');
      // (Streaming networks are hardcoded in the backend to netflix,hulu,amazon,disney for TV currently, so we'll just query movies for now or let the backend handle it).
      
      const startTime = performance.now();
      
      const params = new URLSearchParams({
        age: selectedAge,
        genres: selectedGenres,
        page: page,
        type: 'movie'
      });

      const res = await fetch('/api/discover?' + params.toString(), {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
      });
      const data = await res.json();
      
      const endTime = performance.now();
      const timeTaken = ((endTime - startTime) / 1000).toFixed(2);

      if (page === 1) currentResults = [];
      
      if (data.results && data.results.length > 0) {
        currentResults = currentResults.concat(data.results);
        renderResults(currentResults);
        document.getElementById('resultsSubtext').textContent = `Showing ${currentResults.length} results found in ${timeTaken} seconds`;
        document.getElementById('loadMoreContainer').classList.remove('hidden');
      } else {
        if (page === 1) {
          document.getElementById('resultsContainer').innerHTML = '<p class="p-4 text-on-surface-variant font-medium">No results found matching your filters.</p>';
          document.getElementById('resultsSubtext').textContent = 'No results found.';
        }
        document.getElementById('loadMoreContainer').classList.add('hidden');
      }
      currentPage = page;

    } catch (err) {
      console.error(err);
      if (page === 1) {
        document.getElementById('resultsContainer').innerHTML = '<p class="p-4 text-error font-medium">Failed to load results. Please try again.</p>';
        document.getElementById('resultsSubtext').textContent = 'Error loading results.';
      }
    } finally {
      isFetching = false;
    }
  }

  function loadMore() {
    runDiscover(currentPage + 1);
  }

  function renderResults(results) {
    const list = results.map(item => {
      const poster = item.poster_path ? `<img alt="${item.title}" class="w-20 h-[7.5rem] object-cover rounded-xl shrink-0" src="https://image.tmdb.org/t/p/w200${item.poster_path}"/>` : '<div class="w-20 h-[7.5rem] bg-surface-container-highest rounded-xl shrink-0 flex items-center justify-center text-3xl">ÃƒÂ°Ã…Â¸Ã…Â½Ã‚Â¬</div>';
      const title = item.title || item.name;
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      
      // Determine rating badge color logic
      let badgeHtml = '';
      if (item.cached_verdict) {
        // Find best match if cached
        badgeHtml = `<span class="px-3 py-1 text-xs font-bold bg-tertiary text-on-tertiary rounded-lg">Verified Safe</span>`;
      } else {
        badgeHtml = `<span class="px-3 py-1 text-xs font-bold bg-surface-container-high text-on-surface rounded-lg">Check Safety</span>`;
      }

      return `
        <div class="group flex items-center gap-6 p-4 hover:bg-surface-container-low transition-colors duration-200 border-b border-outline-variant/10 cursor-pointer" onclick="window.location.href='/index?id=${item.id}&type=movie'">
          ${poster}
          <div class="flex-grow">
            <div class="flex items-center justify-between">
              <div>
                <h3 class="font-headline font-bold text-lg text-on-surface group-hover:text-primary transition-colors">${title}</h3>
                <div class="flex items-center gap-2 mt-1">
                  <span class="text-sm font-medium text-on-surface-variant">${year}</span>
                  <span class="w-1 h-1 rounded-full bg-outline-variant"></span>
                  <span class="text-sm text-on-surface-variant">TMDB Pop: ${Math.round(item.popularity || 0)}</span>
                </div>
              </div>
              <div class="flex items-center gap-6">
                <!-- Fake runtime since simple discover doesn't have it -->
                ${badgeHtml}
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('resultsContainer').innerHTML = list;
  }

  // Trigger on load
  document.addEventListener('DOMContentLoaded', () => {
    runDiscover(1);
  });

  // Re-run if auth changes
  document.addEventListener('cv:auth', ({ detail }) => {
    if (detail.loggedIn) {
      runDiscover(1);
    }
  });
</script>
</body>
</html>
