<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

  .main-content {
    padding-bottom: 2rem;
  }

  .tab-btn-v2 {
    position: relative;
    padding-bottom: 1rem;
    font-size: 0.95rem;
    font-weight: 500;
    color: rgb(117 124 127);
    transition: color 180ms ease;
    border-bottom: 2px solid transparent;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tab-btn-v2:hover {
    color: rgb(45 51 54);
  }
  .tab-btn-v2.active {
    color: rgb(86 94 116);
    font-weight: 700;
    border-bottom-color: rgb(86 94 116);
  }

  .side-link {
    transition: background-color 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
  }
  .side-link:hover {
    background: rgb(241 245 249);
    color: rgb(15 23 42);
  }
  .side-link.active {
    background: #ffffff;
    color: rgb(15 23 42);
    font-weight: 700;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }
  .side-link.active .material-symbols-outlined {

  }

  .profile-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.6rem 0.9rem;
    border-radius: 9999px;
    background: rgb(235 238 240);
    color: rgb(89 96 99);
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1;
    transition: background-color 180ms ease, color 180ms ease, transform 180ms ease;
  }
  .profile-pill:hover {
    background: rgb(228 233 236);
    color: rgb(45 51 54);
  }
  .profile-pill.active {

    color: rgb(247 247 255);

  .fade-up {

    transform: translateY(12px);
    animation: fadeUp 400ms ease forwards;
  }
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .skel {
    background: linear-gradient(90deg, rgba(221,227,231,0.9) 25%, rgba(242,244,245,1) 50%, rgba(221,227,231,0.9) 75%);
    background-size: 200% 100%;
    animation: skelShimmer 1.2s ease-in-out infinite;
  }
  @keyframes skelShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: rgba(12, 14, 15, 0.45);
    backdrop-filter: blur(6px);
    z-index: 70;
  }
  .modal-overlay.visible {
    display: flex;
  }
  .modal-sheet {
    width: min(100%, 32rem);
    border-radius: 1.25rem;
    background: #ffffff;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 1.25rem;
    transform: translateX(-50%) translateY(16px);
    opacity: 0;
    pointer-events: none;
    background: rgb(45 51 54);
    color: #fff;
    padding: 0.85rem 1rem;
    border-radius: 9999px;
    font-size: 0.875rem;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 80;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .list-mode .list-card {
    display: grid;
    grid-template-columns: 96px minmax(0, 1fr) auto;
    align-items: center;
    gap: 1rem;
    border-radius: 1rem;
    background: #fff;
    padding: 0.75rem;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
  }
  .list-mode .list-card-poster {

    aspect-ratio: 2 / 3;
    border-radius: 0.875rem;
    overflow: hidden;
  }

      padding-bottom: 5.5rem;

  }

      border-radius: 1rem;
    }

    }

     SCRIPTS

<script>
// ── State ───────────────────────────────────────────────────────────────────
let _lists       = [];
let _profiles    = [];
let _activeTab   = 'approved';
let _activeProfile = 'all';
let _viewMode    = 'grid'; // 'grid' | 'list'
let _editingId   = null;
let _movingId    = null;
let _movingItem  = null;
let _deletingId  = null;

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── API helpers ──────────────────────────────────────────────────────────────
async function _authHeaders() {
  const token = await window.Clerk.session.getToken();
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}
async function apiGet(url) {
  const h = await _authHeaders();
  const r = await fetch(url, { headers: h });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPost(url, body) {
  const h = await _authHeaders();
  const r = await fetch(url, { method: 'POST', headers: h, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPut(url, body) {
  const h = await _authHeaders();
  const r = await fetch(url, { method: 'PUT', headers: h, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiDelete(url) {
  const h = await _authHeaders();
  const r = await fetch(url, { method: 'DELETE', headers: h });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Auth guard ───────────────────────────────────────────────────────────────
document.addEventListener('cv:auth', ({ detail }) => {
  if (!detail.loggedIn) {
    window.location.href = '/signin?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }
  // Respect ?tab= URL param
  const params = new URLSearchParams(window.location.search);
  const tabParam = params.get('tab');
  if (['approved', 'blocked', 'watched', 'watchlater'].includes(tabParam)) {
    _activeTab = tabParam;
  }
  loadLists();
});

// ── Load data ────────────────────────────────────────────────────────────────
async function loadLists() {
  try {
    [_lists, _profiles] = await Promise.all([
      apiGet('/api/lists'),
      apiGet('/api/profiles'),
    ]);
  } catch (e) {
    console.error('Lists load error:', e);
  }

  // Show content
  document.getElementById('pageLoader').classList.add('hidden');
  document.getElementById('pageContent').classList.remove('hidden');
  document.getElementById('pageContent').classList.add('flex');

  updateSidebar();
  updateHeaderSubtitle();
  renderProfileFilter();
  renderActiveTab();
}

// ── Sidebar counts + active state ────────────────────────────────────────────
function updateSidebar() {
  const countApproved  = _lists.filter(l => l.list_type === 'approved').length;
  const countBlocked   = _lists.filter(l => l.list_type === 'blocked').length;
  const countWatchlater = _lists.filter(l => l.list_type === 'watchlater').length;
  const total = _lists.length;

  const sideEl = document.getElementById('sideCountApproved');
  if (sideEl) sideEl.textContent = countApproved || '';
  const sideBlEl = document.getElementById('sideCountBlocked');
  if (sideBlEl) sideBlEl.textContent = countBlocked || '';
  const sideWlEl = document.getElementById('sideCountWatchlater');
  if (sideWlEl) sideWlEl.textContent = countWatchlater || '';

  const subtitleEl = document.getElementById('sidebarSubtitle');
  if (subtitleEl) {
    subtitleEl.textContent =
      total === 0 ? 'No titles saved yet' : `Managing ${total} Title${total !== 1 ? 's' : ''}`;
  }

  // Sync sidebar active button
  ['approved', 'blocked', 'watched', 'watchlater'].forEach(t => {
    const btn = document.getElementById('side' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.classList.toggle('active', t === _activeTab);
  });
  // Sync top tabs
  ['Approved', 'Blocked', 'Watched', 'Watchlater'].forEach(t => {
    const btn = document.getElementById('tab' + t);
    if (btn) btn.classList.toggle('active', t.toLowerCase() === _activeTab);
  });
}

function updateHeaderSubtitle() {
  const approved = _lists.filter(l => l.list_type === 'approved').length;
  const blocked  = _lists.filter(l => l.list_type === 'blocked').length;
  const el = document.getElementById('headerSubtitle');
  if (approved === 0 && blocked === 0) {
    el.textContent = "Curate and manage your household's viewing experience. Start by approving some titles.";
  } else {
    el.innerHTML = `Curate and manage your household's viewing experience. You have <span class="font-bold text-primary">${approved} approved title${approved !== 1 ? 's' : ''}</span>${blocked ? ` and <span class="font-bold text-error">${blocked} blocked</span>` : ''} across all profiles.`;
  }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function setTab(tab, btnEl) {
  _activeTab = tab;
  _activeProfile = 'all';
  // Update top tab buttons
  document.querySelectorAll('.tab-btn-v2').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  // Reset profile pill to "All"
  document.querySelectorAll('.profile-pill').forEach(p => p.classList.toggle('active', p.dataset.pid === 'all'));
  updateSidebar();
  renderList();
}

function setTabFromSidebar(tab) {
  _activeTab = tab;
  _activeProfile = 'all';
  // Sync top tabs
  document.querySelectorAll('.tab-btn-v2').forEach(b => {
    b.classList.toggle('active', b.id.toLowerCase().includes(tab));
  });
  document.querySelectorAll('.profile-pill').forEach(p => p.classList.toggle('active', p.dataset.pid === 'all'));
  updateSidebar();
  renderList();
}

// ── Profile filter ────────────────────────────────────────────────────────────
function renderProfileFilter() {
  const el = document.getElementById('profileFilter');
  if (!_profiles.length) { el.innerHTML = ''; return; }

  let html = `<button class="profile-pill active" data-pid="all" onclick="setProfileFilter('all', this)">All Profiles</button>`;
  _profiles.forEach(p => {
    html += `<button class="profile-pill" data-pid="${p.id}" onclick="setProfileFilter('${p.id}', this)">${p.emoji || '👤'} ${p.name}</button>`;
  });
  el.innerHTML = html;
}

function setProfileFilter(pid, btnEl) {
  _activeProfile = pid;
  document.querySelectorAll('.profile-pill').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  renderList();
}

// ── View toggle (grid / list) ─────────────────────────────────────────────────
function setView(mode) {
  _viewMode = mode;
  const container = document.getElementById('listContainer');
  const btnGrid   = document.getElementById('btnGridView');
  const btnList   = document.getElementById('btnListView');

  if (mode === 'grid') {
    container.classList.remove('list-mode');
    container.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5';
    btnGrid.className = 'p-2 text-primary transition-colors rounded-lg bg-primary/10';
    btnList.className  = 'p-2 text-outline hover:text-primary transition-colors rounded-lg';
  } else {
    container.className = 'list-mode flex flex-col gap-2';
    btnList.className  = 'p-2 text-primary transition-colors rounded-lg bg-primary/10';
    btnGrid.className  = 'p-2 text-outline hover:text-primary transition-colors rounded-lg';
  }
  renderList();
}

// ── Render the item list ──────────────────────────────────────────────────────
function renderActiveTab() {
  // Sync tab UI in case we entered with a ?tab= param
  ['Approved', 'Blocked', 'Watched', 'Watchlater'].forEach(t => {
    const btn = document.getElementById('tab' + t);
    if (btn) btn.classList.toggle('active', t.toLowerCase() === _activeTab);
  });
  renderProfileFilter();
  renderList();
}

function renderList() {
  const container = document.getElementById('listContainer');
  const discover  = document.getElementById('discoverPrompt');

  // Filter by tab + profile
  let items = _lists.filter(l => l.list_type === _activeTab);
  if (_activeProfile !== 'all') {
    items = items.filter(l => l.profile_id === _activeProfile);
  }

  if (!items.length) {
    // Empty state
    const icons = { approved: 'verified', blocked: 'block', watchlater: 'bookmark' };
    const titles = {
      approved: 'No approved titles yet',
      blocked: 'No blocked titles',
      watchlater: 'Your watchlist is empty'
    };
    const descs = {
      approved: 'Mark titles as safe to watch and they\'ll appear here for all family members.',
      blocked: 'Titles you\'ve marked as off-limits will appear here.',
      watchlater: 'Save titles you want to research or watch later.'
    };
    container.innerHTML = `
      <div class="col-span-full py-16 flex flex-col items-center text-center gap-4">
        <div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center">
          <span class="material-symbols-outlined text-4xl text-outline">${icons[_activeTab] || 'list'}</span>
        </div>
        <h3 class="font-headline font-bold text-xl text-on-surface">${titles[_activeTab] || 'Nothing here yet'}</h3>
        <p class="text-on-surface-variant text-sm max-w-xs leading-relaxed">${descs[_activeTab] || ''}</p>
        <a href="/discover" class="mt-2 inline-flex items-center gap-2 px-6 py-2.5 bg-primary text-on-primary font-bold rounded-full hover:bg-primary-dim transition-all active:scale-95 text-sm shadow-md shadow-primary/20">
          <span class="material-symbols-outlined text-[16px]">explore</span>
          Discover Titles
        </a>
      </div>`;
    discover.classList.add('hidden');
    return;
  }

  // Render cards
  container.innerHTML = items.map(item => renderCard(item)).join('') + renderAddNewPlaceholder();

  // Show discover prompt below grid when there are items
  if (items.length < 8) {
    discover.classList.remove('hidden');
    discover.classList.add('flex');
  } else {
    discover.classList.add('hidden');
  }
}

function verdictBadgeHTML(listType) {
  if (listType === 'approved') return `<span class="absolute top-3 right-3 bg-tertiary text-on-tertiary text-[10px] font-bold px-2 py-1 rounded tracking-widest uppercase card-safe-badge">SAFE</span>`;
  if (listType === 'blocked')  return `<span class="absolute top-3 right-3 bg-error text-white text-[10px] font-bold px-2 py-1 rounded tracking-widest uppercase card-safe-badge">BLOCKED</span>`;
  return `<span class="absolute top-3 right-3 bg-primary-container text-on-primary-container text-[10px] font-bold px-2 py-1 rounded tracking-widest uppercase card-safe-badge">WATCHLIST</span>`;
}

function renderCard(item) {
  const profile = item.profile_id ? _profiles.find(p => p.id === item.profile_id) : null;
  const posterSrc = item.poster || '';
  const posterHTML = posterSrc
    ? `<img src="${posterSrc}" alt="${escAttr(item.title)}" class="object-cover w-full h-full" loading="lazy"/>`
    : `<div class="w-full h-full flex items-center justify-center bg-surface-container text-5xl">🎬</div>`;

  const typeLabel = item.media_type === 'tv' ? 'TV' : 'Film';
  const typeBg    = item.media_type === 'tv' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700';
  const yearStr   = item.year ? `<span class="font-medium">${item.year}</span><span>•</span>` : '';
  const profileTag = profile ? `<span class="text-[10px] font-bold text-primary">• ${profile.emoji || ''} ${profile.name}</span>` : '';
  const noteTitle = esc(item.title);
  const noteVal   = esc(item.note || '');
  const safeTitle = esc(item.title);

  return `
  <div class="movie-card group relative bg-surface-container-lowest rounded-xl overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-lg shadow-sm cursor-pointer"
       onclick="openTitle('${item.tmdb_id}', '${item.media_type}')">
    <div class="card-poster-wrap aspect-[2/3] overflow-hidden relative">
      ${posterHTML}
      ${verdictBadgeHTML(item.list_type)}

      <!-- Grid hover actions -->
      <div class="card-hover-actions absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center pb-4 space-x-3">
        <button class="bg-white/20 backdrop-blur-md text-white p-2 rounded-full hover:bg-white/40 transition-colors"
                onclick="event.stopPropagation(); openMoveModal('${item.id}', '${noteTitle}')"
                title="Move to another list">
          <span class="material-symbols-outlined text-[18px]">swap_horiz</span>
        </button>
        <button class="bg-white/20 backdrop-blur-md text-white p-2 rounded-full hover:bg-white/40 transition-colors"
                onclick="event.stopPropagation(); openNoteModal('${item.id}', '${noteTitle}', '${noteVal}')"
                title="Edit note">
          <span class="material-symbols-outlined text-[18px]">edit_note</span>
        </button>
        <button class="bg-error/80 backdrop-blur-md text-white p-2 rounded-full hover:bg-error transition-colors"
                onclick="event.stopPropagation(); promptDelete('${item.id}', '${safeTitle}')"
                title="Remove">
          <span class="material-symbols-outlined text-[18px]">delete</span>
        </button>
      </div>
    </div>

    <div class="card-body p-3">
      <h4 class="text-sm font-bold text-on-surface line-clamp-1 mb-1">${esc(item.title)}</h4>
      <div class="flex items-center flex-wrap gap-1.5 text-[11px] text-outline">
        ${yearStr}
        <span class="${typeBg} px-1.5 py-0.5 rounded font-bold text-[10px]">${typeLabel}</span>
        ${profileTag}
      </div>
      ${item.note ? `<p class="text-[11px] text-on-surface-variant mt-1.5 line-clamp-1 italic">💬 ${esc(item.note)}</p>` : ''}

      <!-- List mode row actions (always visible in list view) -->
      <div class="card-list-actions mt-2">
        <button class="card-list-action-btn" onclick="event.stopPropagation(); openMoveModal('${item.id}', '${noteTitle}')" title="Move">
          <span class="material-symbols-outlined text-[16px]">swap_horiz</span>
        </button>
        <button class="card-list-action-btn" onclick="event.stopPropagation(); openNoteModal('${item.id}', '${noteTitle}', '${noteVal}')" title="Note">
          <span class="material-symbols-outlined text-[16px]">edit_note</span>
        </button>
        <button class="card-list-action-btn danger" onclick="event.stopPropagation(); promptDelete('${item.id}', '${safeTitle}')" title="Remove">
          <span class="material-symbols-outlined text-[16px]">delete</span>
        </button>
      </div>
    </div>
  </div>`;
}

function renderAddNewPlaceholder() {
  return `
  <button onclick="window.location.href='/discover'"
          class="group border-2 border-dashed border-outline-variant/50 rounded-xl flex flex-col items-center justify-center space-y-3 p-6 hover:border-primary transition-colors hover:bg-primary/5 min-h-[100px]">
    <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-outline group-hover:text-primary transition-colors">
      <span class="material-symbols-outlined">add</span>
    </div>
    <span class="text-xs font-bold text-outline group-hover:text-primary text-center">Add Titles via Discover</span>
  </button>`;
}

// ── Navigate to detail page ───────────────────────────────────────────────────
function openTitle(tmdbId, mediaType) {
  window.location.href = `/index?id=${tmdbId}&type=${mediaType}`;
}

// ── Note Modal ────────────────────────────────────────────────────────────────
function openNoteModal(id, title, existingNote) {
  _editingId = id;
  document.getElementById('noteModalTitle').textContent = title;
  document.getElementById('noteInput').value = existingNote || '';
  document.getElementById('noteModal').classList.add('visible');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('noteInput').focus(), 200);
}

async function saveNote() {
  const btn  = document.getElementById('noteSaveBtn');
  const note = document.getElementById('noteInput').value.trim();
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const updated = await apiPut(`/api/lists?id=${_editingId}`, { note });
    const idx = _lists.findIndex(l => l.id === _editingId);
    if (idx !== -1) _lists[idx] = updated;
    closeNoteModal();
    renderList();
    showToast('Note saved ✓');
  } catch (e) {
    showToast('Failed to save note');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function closeNoteModal() {
  document.getElementById('noteModal').classList.remove('visible');
  document.body.style.overflow = '';
}

// ── Move Modal ────────────────────────────────────────────────────────────────
function openMoveModal(id, title) {
  _movingId   = id;
  _movingItem = _lists.find(l => l.id === id);
  document.getElementById('moveModalTitle').textContent = title;
  document.getElementById('moveModal').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

async function moveItem(newListType) {
  if (!_movingItem) return;
  const item = _movingItem;
  closeMoveModal();
  try {
    const updated = await apiPost('/api/lists', {
      tmdb_id:    item.tmdb_id,
      media_type: item.media_type,
      title:      item.title,
      year:       item.year,
      poster:     item.poster,
      list_type:  newListType,
      profile_id: item.profile_id,
      note:       item.note,
    });
    const idx = _lists.findIndex(l => l.id === item.id);
    if (idx !== -1) _lists[idx] = updated;
    updateSidebar();
    updateHeaderSubtitle();
    renderList();
    showToast(`Moved to ${newListType} ✓`);
  } catch (e) {
    showToast('Failed to move item');
  }
}

function closeMoveModal() {
  document.getElementById('moveModal').classList.remove('visible');
  document.body.style.overflow = '';
  _movingId = null;
  _movingItem = null;
}

// ── Delete Modal ──────────────────────────────────────────────────────────────
function promptDelete(id, title) {
  _deletingId = id;
  document.getElementById('deleteModalTitle').textContent = `"${title}" will be removed from this list.`;
  document.getElementById('deleteModal').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

async function confirmDelete() {
  const btn  = document.getElementById('deleteConfirmBtn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Removing…';
  try {
    await apiDelete(`/api/lists?id=${_deletingId}`);
    _lists = _lists.filter(l => l.id !== _deletingId);
    updateSidebar();
    updateHeaderSubtitle();
    renderList();
    closeDeleteModal();
    showToast('Removed from list');
  } catch (e) {
    showToast('Failed to remove');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('visible');
  document.body.style.overflow = '';
}

// ── Escape helpers ────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
function escAttr(str) { return esc(str); }

// ── Close modals on backdrop click or Escape ──────────────────────────────────
['noteModal', 'moveModal', 'deleteModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === document.getElementById(id)) {
      if (id === 'noteModal')   closeNoteModal();
      if (id === 'moveModal')   closeMoveModal();
      if (id === 'deleteModal') closeDeleteModal();
    }
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeNoteModal();
    closeMoveModal();
    closeDeleteModal();
  }
});
</script>

<div id="footer-root"></div>

<script src="/js/dashboard-sidebar.js?v=dev"></script>
<script src="/js/auth.js?v=dev"></script>
</body>
