<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#565e74"/>
<title>Activity Log — OkToWatch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-dim":"#d3dbdf","tertiary":"#006d4a","surface-variant":"#dde3e7",
        "secondary-fixed":"#dce2f3","on-secondary-container":"#4b525f",
        "secondary-container":"#dce2f3","inverse-primary":"#dae2fd","outline":"#757c7f",
        "on-tertiary-container":"#005a3c","error-container":"#fe8983",
        "surface-container-low":"#f2f4f5","primary-fixed-dim":"#ccd4ee",
        "primary-container":"#dae2fd","surface-container-highest":"#dde3e7",
        "primary":"#565e74","on-primary":"#f7f7ff","on-tertiary":"#e6ffee",
        "surface-bright":"#f9f9fa","on-primary-container":"#4a5167",
        "background":"#f9f9fa","surface":"#f9f9fa","surface-container-lowest":"#ffffff",
        "secondary":"#585f6d","on-secondary":"#f8f8ff","outline-variant":"#acb3b6",
        "on-error":"#fff7f6","on-surface":"#2d3336","surface-tint":"#565e74",
        "on-background":"#2d3336","inverse-surface":"#0c0e0f",
        "surface-container-high":"#e4e9ec","on-surface-variant":"#596063",
        "surface-container":"#ebeef0","primary-dim":"#4a5268","primary-fixed":"#dae2fd",
        "tertiary-container":"#69f6b8","error":"#9f403d"
      },
      borderRadius: { DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem" },
      fontFamily: { headline:["Plus Jakarta Sans"],body:["Inter"],label:["Inter"] }
    }
  }
}
</script>
<style>
  body { font-family:'Inter',sans-serif; }
  h1,h2,h3,.font-headline { font-family:'Plus Jakarta Sans',sans-serif; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .hide-scrollbar::-webkit-scrollbar { display:none; }
  .hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
  /* Skeleton */
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel { background:linear-gradient(90deg,#e4e9ec 25%,#f2f4f5 50%,#e4e9ec 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:0.5rem; }
  /* Page swap */
  #pageLoader { display:block; }
  #pageLoader.hidden { display:none; }
  #pageContent { display:none; }
  #pageContent.visible { display:block; }
  /* Toast */
  .toast { position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,26,24,0.92);color:white;backdrop-filter:blur(12px);padding:0.65rem 1.25rem;border-radius:100px;font-size:0.82rem;font-weight:600;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
  /* Table */
  .activity-table { width:100%;border-collapse:collapse; }
  .activity-table td { padding:1rem;border-bottom:1px solid #dde3e7; }
  .activity-table tbody tr:hover { background-color:#f2f4f5; }
  .outcome-badge { display:inline-block;padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:600; }
  .outcome-allowed { background:#d4f1e7;color:#005a3c; }
  .outcome-approved { background:#c8e6d9;color:#004d39; }
  .outcome-blocked { background:#ffcccb;color:#9f403d; }
  .outcome-flagged { background:#fff4d6;color:#f57f17; }
</style>
</head>
<body class="bg-background text-on-surface" data-page="dashboard">

<div id="nav-root"></div>

<!-- ── Skeleton loader ──────────────────────────────────────────────────── -->
<div id="pageLoader">
  <div class="pt-16 pb-6 max-w-5xl mx-auto px-8 space-y-8">
    <div class="skel h-10 w-64 rounded"></div>
    <div class="space-y-4">
      <div class="flex gap-4"><div class="skel h-10 w-40 rounded-xl"></div><div class="skel h-10 w-40 rounded-xl"></div></div>
      <div class="border border-outline-variant/20 rounded-2xl">
        <div style="height:300px" class="skel"></div>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="skel h-32 rounded-xl"></div>
      <div class="skel h-32 rounded-xl"></div>
      <div class="skel h-32 rounded-xl"></div>
    </div>
  </div>
</div>

<!-- ── Page content ─────────────────────────────────────────────────────── -->
<div id="pageContent">
<main class="pt-16 pb-12 max-w-5xl mx-auto px-8 space-y-8">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header class="space-y-2">
    <h1 class="text-3xl font-bold tracking-tight">Activity Log</h1>
    <p class="text-on-surface-variant">Track search history and verdict results for each family member</p>
  </header>

  <!-- ── Filters ────────────────────────────────────────────────────────── -->
  <div class="flex flex-col md:flex-row gap-4">
    <!-- Profile filter -->
    <div class="flex-1">
      <label class="block text-xs font-semibold text-on-surface-variant mb-1.5 uppercase">Child Profile</label>
      <select id="profileFilter" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl px-4 py-2.5 text-sm font-medium outline-none focus:border-primary transition-colors" onchange="applyFilters()">
        <option value="">All profiles</option>
      </select>
    </div>
    <!-- Date range filter -->
    <div class="flex-1">
      <label class="block text-xs font-semibold text-on-surface-variant mb-1.5 uppercase">Time Period</label>
      <select id="dateFilter" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl px-4 py-2.5 text-sm font-medium outline-none focus:border-primary transition-colors" onchange="applyFilters()">
        <option value="7">Last 7 Days</option>
        <option value="1">Today</option>
        <option value="30">This Month</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <button onclick="resetFilters()" class="md:mt-6 px-4 py-2.5 rounded-xl font-medium text-sm bg-surface-container-high text-on-surface hover:bg-surface-container-highest transition-colors">Reset</button>
  </div>

  <!-- ── Activity Table ────────────────────────────────────────────────── -->
  <section class="bg-surface-container-lowest rounded-2xl border border-outline-variant/20 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="activity-table">
        <thead class="bg-surface-container-low text-on-surface-variant text-xs font-bold uppercase tracking-wide border-b border-outline-variant/20">
          <tr>
            <td class="w-32">Timestamp</td>
            <td class="w-32">Profile</td>
            <td class="flex-1">Activity</td>
            <td class="w-24">Outcome</td>
            <td class="w-20">Details</td>
          </tr>
        </thead>
        <tbody id="activityTable" class="text-sm">
          <tr><td colspan="5" class="text-center py-8 text-on-surface-variant">Loading activity…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- ── Insights Grid ────────────────────────────────────────────────── -->
  <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Safety Health metric -->
    <div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/20 space-y-2">
      <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase text-on-surface-variant">Safety Health</span>
        <span class="material-symbols-outlined text-tertiary text-xl" style="font-variation-settings:'FILL' 1;">verified</span>
      </div>
      <div class="flex items-baseline gap-2">
        <span class="text-4xl font-extrabold text-tertiary" id="healthPercent">—</span>
        <span class="text-on-surface-variant text-sm">% approved</span>
      </div>
      <p class="text-xs text-on-surface-variant pt-2">Ratio of approved vs blocked verdicts</p>
    </div>

    <!-- Top Queried Items -->
    <div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/20 space-y-4">
      <span class="text-xs font-bold uppercase text-on-surface-variant">Top Searched</span>
      <div id="topQueries" class="space-y-3">
        <p class="text-sm text-on-surface-variant">No activity yet</p>
      </div>
    </div>

    <!-- Action Items -->
    <div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/20 space-y-4">
      <span class="text-xs font-bold uppercase text-on-surface-variant">Action Items</span>
      <div id="actionItems" class="space-y-3">
        <p class="text-sm text-on-surface-variant">No flagged items</p>
      </div>
    </div>
  </section>

</main>

<!-- Footer -->
<div id="footer-root"></div>
</div><!-- end #pageContent -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
let _profiles=[], _activity=[], _filtered=[];
let _currentProfileId='', _currentDays=7;

// Toast
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Auth/API helpers  
async function getToken(){
  if(!window.Clerk?.session)return null;
  try{return await window.Clerk.session.getToken();}
  catch(e){console.error('Failed to get token:',e);return null;}
}

async function apiGet(url){
  const token=await getToken();if(!token){console.error('No auth token');return null;}
  try{
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
    if(!res.ok){console.error(`API error ${res.status}:`,url);return null;}
    return res.json();
  }catch(e){console.error('API fetch error:',e);return null;}
}

// Auth guard
let _authReceived=false;
document.addEventListener('cv:auth',({detail})=>{
  _authReceived=true;
  if(!detail.loggedIn){window.location.href='/signin?redirect=/dashboard';return;}
  loadDashboard(detail.user);
});
setTimeout(()=>{
  if(_authReceived)return;
  document.getElementById('pageLoader').classList.add('hidden');
  document.getElementById('pageContent').classList.add('visible');
},12000);

// ────────────────────────────────────────────────────────────────────
// LOAD DASHBOARD - Main initialization
// ────────────────────────────────────────────────────────────────────
async function loadDashboard(user){
  try{
    // REAL API CALL: Fetch child profiles
    const profilesRes=await apiGet('/api/profiles');
    _profiles=profilesRes||[];
    
    // REAL API CALL: Fetch activity/history
    const historyRes=await apiGet('/api/history');
    _activity=historyRes||[];
    
    // Populate profile dropdown
    const profileSelect=document.getElementById('profileFilter');
    profileSelect.innerHTML='<option value="">All profiles</option>';
    _profiles.forEach(p=>{
      const opt=document.createElement('option');
      opt.value=p.id;
      opt.textContent=p.name||'Profile';
      profileSelect.appendChild(opt);
    });
    
    // Hide loader, show content
    document.getElementById('pageLoader').classList.add('hidden');
    document.getElementById('pageContent').classList.add('visible');
    
    // Render initial state
    applyFilters();
  }catch(e){
    console.error('Dashboard load error:',e);
    document.getElementById('pageLoader').classList.add('hidden');
    document.getElementById('pageContent').classList.add('visible');
    showToast('Could not load activity data');
  }
}

// ────────────────────────────────────────────────────────────────────
// FILTERS - Apply profile and date range
// ────────────────────────────────────────────────────────────────────
function applyFilters(){
  _currentProfileId=document.getElementById('profileFilter').value||'';
  const dateRange=document.getElementById('dateFilter').value;
  _currentDays=dateRange==='all'?null:parseInt(dateRange);
  
  // Filter by profile and date
  const now=new Date();
  const cutoffDate=_currentDays===null?null:new Date(now.getTime()-_currentDays*24*60*60*1000);
  
  _filtered=_activity.filter(item=>{
    if(!item.created_at)return false;
    const itemDate=new Date(item.created_at);
    if(cutoffDate && itemDate<cutoffDate)return false;
    if(_currentProfileId && item.profile_id!==_currentProfileId)return false;
    return true;
  });
  
  // Sort newest first
  _filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  
  // Render results
  renderActivityTable();
  updateInsights();
}

function resetFilters(){
  document.getElementById('profileFilter').value='';
  document.getElementById('dateFilter').value='7';
  applyFilters();
}

// ────────────────────────────────────────────────────────────────────
// RENDER - Activity table
// ────────────────────────────────────────────────────────────────────
function renderActivityTable(){
  const tbody=document.getElementById('activityTable');
  
  if(!_filtered.length){
    tbody.innerHTML='<tr><td colspan="5" class="text-center py-8 text-on-surface-variant">No activity for selected filters</td></tr>';
    return;
  }
  
  tbody.innerHTML=_filtered.map(item=>{
    const profileName=getProfileName(item.profile_id);
    const timestamp=formatTime(item.created_at);
    const outcome=item.verdict||'unknown';
    const badgeClass=getOutcomeBadgeClass(outcome);
    const outcomeLbl=getOutcomeLabel(outcome);
    const title=item.title||item.query||'(Unknown)';
    
    return `
      <tr>
        <td class="text-xs text-on-surface-variant">${timestamp}</td>
        <td>
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center text-sm flex-shrink-0">${getProfileEmoji(item.profile_id)}</div>
            <span class="text-xs font-medium">${escapeHtml(profileName)}</span>
          </div>
        </td>
        <td>
          <div class="space-y-1">
            <p class="text-sm font-medium">${escapeHtml(title)}</p>
            <p class="text-xs text-on-surface-variant">${item.media_type==='movie'?'Movie':'TV Series'}</p>
          </div>
        </td>
        <td>
          <span class="outcome-badge ${badgeClass}">${outcomeLbl}</span>
        </td>
        <td>
          <button onclick="alert('Details for: '+${JSON.stringify(title)})" class="text-xs font-medium text-primary hover:underline">View</button>
        </td>
      </tr>
    `;
  }).join('');
}

// ────────────────────────────────────────────────────────────────────
// INSIGHTS - Safety health, top queries, action items
// ────────────────────────────────────────────────────────────────────
function updateInsights(){
  // Safety Health: % approved of all verdicts
  const total=_filtered.length;
  const approved=_filtered.filter(i=>i.verdict==='approved'||i.verdict==='allowed').length;
  const healthPercent=total>0?Math.round((approved/total)*100):0;
  document.getElementById('healthPercent').textContent=healthPercent+'%';
  
  // Top Queried: Most searched titles
  const queryCount={};
  _filtered.forEach(item=>{
    const key=item.title||item.query||'Unknown';
    queryCount[key]=(queryCount[key]||0)+1;
  });
  const topQueries=Object.entries(queryCount)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);
  
  const topQueriesEl=document.getElementById('topQueries');
  if(topQueries.length){
    topQueriesEl.innerHTML=topQueries.map(([q,count])=>`
      <div class="flex justify-between items-center">
        <span class="text-sm">${escapeHtml(q)}</span>
        <span class="text-xs font-bold text-primary bg-primary-container px-2 py-1 rounded">${count}x</span>
      </div>
    `).join('');
  }else{
    topQueriesEl.innerHTML='<p class="text-sm text-on-surface-variant">No data yet</p>';
  }
  
  // Action Items: Flagged verdicts
  const flagged=_filtered.filter(i=>i.verdict==='blocked');
  const actionItemsEl=document.getElementById('actionItems');
  if(flagged.length){
    actionItemsEl.innerHTML=flagged.slice(0,3).map(item=>`
      <div class="flex gap-2">
        <span class="material-symbols-outlined text-error text-lg">do_not_disturb_on</span>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate">${escapeHtml(item.title||'')}</p>
          <p class="text-xs text-on-surface-variant">${getProfileName(item.profile_id)}</p>
        </div>
      </div>
    `).join('');
  }else{
    actionItemsEl.innerHTML='<p class="text-sm text-on-surface-variant">No blocked items</p>';
  }
}

// ────────────────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────────────────
function getProfileName(profileId){
  if(!profileId)return 'Unknown';
  const p=_profiles.find(x=>x.id===profileId);
  return p?.name||'Unknown';
}

function getProfileEmoji(profileId){
  if(!profileId)return '👤';
  const p=_profiles.find(x=>x.id===profileId);
  return p?.emoji||'👤';
}

function formatTime(isoStr){
  if(!isoStr)return '—';
  const date=new Date(isoStr);
  const now=new Date();
  const diff=(now-date)/(1000*60);
  
  if(diff<1)return 'Now';
  if(diff<60)return Math.floor(diff)+'m ago';
  if(diff<1440)return Math.floor(diff/60)+'h ago';
  
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function getOutcomeBadgeClass(verdict){
  const map={
    'allowed':'outcome-allowed',
    'approved':'outcome-approved',
    'blocked':'outcome-blocked',
    'flagged':'outcome-flagged'
  };
  return map[verdict]||'outcome-allowed';
}

function getOutcomeLabel(verdict){
  const map={
    'allowed':'Allowed',
    'approved':'Approved',
    'blocked':'Blocked',
    'flagged':'Flagged'
  };
  return map[verdict]||'Allowed';
}

function escapeHtml(s){
  if(!s)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
</script>
<script src="/js/auth.js?v=20260406"></script>
</body>
</html>
